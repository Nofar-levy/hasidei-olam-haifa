<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גן חסידי אומות העולם – חיפה</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:grid;
  grid-template-columns: 380px 1fr;
  height:100vh;
  background:#f6f3ec;
}

.sidebar {
  background:#fff;
  padding:15px;
  overflow:auto;
  border-left:1px solid #ddd;
}

.card img {
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

.list-item {
  padding:8px;
  margin:4px 0;
  border:1px solid #ddd;
  border-radius:10px;
  cursor:pointer;
}

.list-item:hover {
  background:#f0f0f0;
}

.map {
  display:flex;
  align-items:center;
  justify-content:center;
}

svg {
  width:100%;
  max-width:900px;
}

.marker {
  cursor:pointer;
}

.marker circle {
  fill:#c2410c;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>גן חסידי אומות העולם</h2>
  <div id="detail"></div>
  <hr>
  <div id="list"></div>
</div>

<div class="map">
<svg viewBox="0 0 1000 700" id="map"></svg>
</div>

<script>

const points = [
{ id:"entry", title:"כניסה", x:100, y:600, image:"images/entry.jpg", description:"כניסה לגן" },
{ id:"path", title:"שביל העלייה", x:200, y:500, image:"images/path-up.jpg", description:"שביל גישה" },
{ id:"orientation", title:"התמצאות", x:350, y:400, image:"images/orientation.jpg", description:"מפת מידע" },
{ id:"plaza", title:"רחבה מרכזית", x:500, y:350, image:"images/plaza.jpg", description:"מרכז הגן" },

{ id:"children", title:"גן ילדי הנצח", x:750, y:550, image:"images/children-memorial.jpg", description:"אנדרטה לילדים" },
{ id:"play", title:"גן משחקים", x:850, y:600, image:"images/playground.jpg", description:"אזור משחקים" },

{ id:"s17", title:"יז'י שלאג", x:400, y:450, image:"images/story-17.jpg", description:"סייע ליהודים בגטו" },
{ id:"s13", title:"מריה סרבניאק", x:600, y:550, image:"images/story-13.jpg", description:"הסתירה משפחה יהודית" },
{ id:"s6", title:"אירנה זינטל", x:800, y:300, image:"images/story-06.jpg", description:"הסתירה 13 יהודים" }
];

const map = document.getElementById("map");
const list = document.getElementById("list");
const detail = document.getElementById("detail");

function renderMap(){
  map.innerHTML="";
  points.forEach(p=>{
    const g=document.createElementNS("http://www.w3.org/2000/svg","g");
    g.setAttribute("class","marker");
    g.setAttribute("transform",`translate(${p.x},${p.y})`);

    const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("r",12);

    g.appendChild(c);
    g.onclick=()=>showDetail(p);

    map.appendChild(g);
  });
}

function renderList(){
  list.innerHTML="";
  points.forEach(p=>{
    const div=document.createElement("div");
    div.className="list-item";
    div.textContent=p.title;
    div.onclick=()=>showDetail(p);
    list.appendChild(div);
  });
}

function showDetail(p){
  detail.innerHTML=`
    <div class="card">
      <h3>${p.title}</h3>
      <p>${p.description}</p>
      <img src="${p.image}">
    </div>
  `;
}

renderMap();
renderList();
showDetail(points[0]);

</script>

</body>
</html>
